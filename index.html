}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0c10; --panel:#141722; --ink:#f1f2f7; --muted:#a2a6bb; --line:#24283a;

*{box-sizing:border-box}

button,input,select,textarea{font:inherit}
.hidden{display:none!important}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}

 .nav a{color:#b9bdd2}
 .nav a.active,.nav a:hover{background:rgba(255,59,92,.12);color:#ff7f98}
}
.nav .badge{margin-left:auto;background:var(--brand);color:#fff;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700}
.sec{padding:10px 18px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}

.probar{height:6px;background:rgba(255,255,255,.35);border-radius:6px;margin-top:8px}

function fmt(n){ if(n>=1_000_000) return (n/1_000_000).toFixed(n%1_000_000===0?0:1)+' jt'; if(n>=1000) return (n/1000).toFixed(1)+' rb'; return String(n) }
function dur(s){ const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), x=s%60; return h? `${h}:${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}` : `${m}:${String(x).padStart(2,'0')}` }
function parseYT(u){
  if(!u) return null;
  if(/^[a-zA-Z0-9_-]{11}$/.test(u)) return u;
  try{
    const url=new URL(u);
    if(url.hostname.includes('youtu.be')) return url.pathname.slice(1);
    const v=url.searchParams.get('v'); if(v) return v;
    const p=url.pathname.split('/');
    const e=p.indexOf('embed'); if(e>-1) return p[e+1];
    const s=p.indexOf('shorts'); if(s>-1) return p[s+1];
    return null;
  }catch{return null}
}
function toast(msg, good=true){
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  el.textContent=msg;
  el.style.borderLeft=`4px solid ${good?'#0fa86b':'#ff3b5c'}`;
  t.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

function render(){
  const root = document.getElementById('root');
  if(!state.user){ root.innerHTML = loginView(); return; }
  let inner='';
  if(state.route==='dashboard') inner = viewDashboard();
  else if(state.route==='videos') inner = viewVideos();
  else if(state.route==='clipper') inner = viewClipper();
  else if(state.route==='clips') inner = viewClips();
  else if(state.route==='analytics') inner = viewAnalytics();
  else if(state.route==='settings') inner = viewSettings();
  else inner = viewDashboard();
  root.innerHTML = shell(inner) + modalHtml();
}

/* actions */
function go(r){ state.route=r; location.hash=r; render(); document.getElementById('sidebar')?.classList.remove('open') }
function setFilter(k,v){ state.filter[k]=v; render() }
function setFilterQ(v){ state.filter.q=v }
function doLogin(){
  const email=document.getElementById('li_email').value.trim().toLowerCase();
  const pass=document.getElementById('li_pass').value;
  const users=DB.get('cm_users',[]);
  const u=users.find(x=>x.email===email && x.pass===pass);
  if(!u){ toast('Email / password salah', false); return }
  state.user={id:u.id,name:u.name,email:u.email};
  DB.set('cm_session', state.user);
  toast('Masuk berhasil!');
  render();
}
function logout(){ DB.set('cm_session', null); state.user=null; render(); }

function openVideoModal(id){
  const v = id ? videos().find(x=>x.id===id) : null;
  state.modal={type:'video', data: v? {...v}: {}};
  render();
  setTimeout(()=>{
    const inp=document.getElementById('mv_url');
    const upd=()=>{ const el=document.getElementById('mv_parsed'); if(el) el.textContent = parseYT(inp.value)||'-' };
    if(inp){ inp.addEventListener('input', upd); upd(); }
  },0);
}
function saveVideoModal(){
  const url=document.getElementById('mv_url').value.trim();
  const yid=parseYT(url);
  if(!yid){ toast('URL YouTube tidak valid', false); return }
  const title=document.getElementById('mv_title').value.trim() || 'Untitled Video';
  const channel=document.getElementById('mv_channel').value.trim() || 'Unknown';
  const duration=parseInt(document.getElementById('mv_dur').value)||900;
  const vs=videos();
  const data=state.modal.data;
  if(data.id){
    const idx=vs.findIndex(x=>x.id===data.id);
    if(idx>-1) vs[idx]={...vs[idx], url, youtubeId:yid, title, channel, duration};
    toast('Video terupdate');
  } else {
    vs.unshift({id:'v'+uid(), youtubeId:yid, title, channel, duration, views: Math.floor(50000+Math.random()*2000000), url: url.startsWith('http')?url:`https://youtube.com/watch?v=${yid}`, tags:''});
    toast('Video ditambahkan');
  }
  saveVideos(vs);
  state.modal=null; render();
}
function delVideo(id){
  if(!confirm('Hapus video ini? Clips terkait ikut terhapus.')) return;
  let vs=videos().filter(v=>v.id!==id);
  saveVideos(vs);
  let cs=clips().filter(c=>c.videoId!==id);
  saveClips(cs);
  toast('Video terhapus');
  render();
}

function runAI(){
  const url=state.clipper.url;
  const yid=parseYT(url);
  if(!yid){ toast('URL tidak valid', false); return }
  state.clipper.running=true; render();
  setTimeout(()=>{
    // find or create video
    let vs=videos();
    let video=vs.find(v=>v.youtubeId===yid);
    if(!video){
      video={id:'v'+uid(), youtubeId:yid, title:'Analyzed Video '+yid, channel:'Imported Channel', duration:2400, views: Math.floor(Math.random()*2_500_000), url: url.startsWith('http')?url:`https://youtube.com/watch?v=${yid}`, tags:'ai,import'};
      vs.unshift(video); saveVideos(vs);
    }
    const target=state.clipper.target;
    const slots=[
      {p:.08,label:'Hook Pembuka Kuat',emotion:'HIGH',reason:'Cold open retention spike'},
      {p:.22,label:'Jokes Spontan Viral',emotion:'FUNNY',reason:'Audio laugh peak'},
      {p:.44,label:'Reveal / Plot Twist',emotion:'SHOCK',reason:'Comment spike & rewatch'},
      {p:.67,label:'Quote Emas 60s',emotion:'HIGH',reason:'Text overlay potential'},
      {p:.81,label:'Closing Callout',emotion:'FUNNY',reason:'Strong CTA energy'},
    ];
    const moments=slots.map(s=>{
      const center=Math.floor(video.duration*s.p);
      const start=Math.max(5, Math.min(center, video.duration-target-5));
      const score = Math.round((88+Math.random()*9 + (s.p===0.44?2:0))*10)/10;
      return {id:uid(), start, end:start+target, label:s.label, emotion:s.emotion, reason:s.reason, score};
    }).sort((a,b)=>b.score-a.score);
    state.clipper.result={video,moments};
    state.clipper.running=false;
    render();
    toast(`${moments.length} momen ditemukan`);
  }, 1200);
}

function makeClip(m){
  const r=state.clipper.result;
  if(!r) return;
  const cs=clips();
  cs.unshift({
    id:'c'+uid(),
    videoId:r.video.id,
    title: m.label + ' — ' + r.video.channel,
    start:m.start, end:m.end,
    score:m.score,
    platform:'tiktok',
    status:'DRAFT',
    views:0, likes:0,
    hook:m.reason,
    tags:'ai,auto'
  });
  saveClips(cs);
  toast('Clip 60s dibuat! Cek Koleksi Clip.');
}

function delClip(id){
  const prev=clips();
  const next=prev.filter(c=>c.id!==id);
  saveClips(next); render(); toast('Clip dihapus');
}
function quickStatus(id,s){
  const cs=clips();
  const c=cs.find(x=>x.id===id);
  if(c){ c.status=s; saveClips(cs); toast('Status: '+s); render(); }
}
function openClipModal(id){
  const c=clips().find(x=>x.id===id);
  if(!c) return;
  state.modal={type:'clip', data:{...c}};
  render();
}
function saveClipModal(){
  const data=state.modal.data;
  const cs=clips();
  const idx=cs.findIndex(x=>x.id===data.id);
  if(idx>-1){
    cs[idx].title = document.getElementById('mc_title').value;
    cs[idx].hook = document.getElementById('mc_hook').value;
    cs[idx].platform = document.getElementById('mc_platform').value;
    cs[idx].status = document.getElementById('mc_status').value;
    cs[idx].tags = document.getElementById('mc_tags').value;
    saveClips(cs);
    state.modal=null;
    toast('Clip tersimpan');
    render();
  }
}
function closeModal(e){ if(e.target.classList.contains('modal-bg')){ state.modal=null; render(); } }

window.addEventListener('hashchange', ()=>{ state.route=location.hash.replace('#','')||'dashboard'; render() });
render();
</script>
